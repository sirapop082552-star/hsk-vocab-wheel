<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 วงล้อคำศัพท์จีน HSK1-6 — เรื่องสยองขวัญรางวัล 10 ล้าน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;800&family=Noto+Sans+SC:wght@500;900&display=swap');
  :root {
    --bg0:#0b0e1d;
    --card:rgba(255,255,255,.045);
    --card-border:rgba(255,255,255,.09);
    --gold:#ffd54f; --text:#e8ecf8; --muted:#8b93b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Noto Sans Thai","Segoe UI","Noto Sans SC","Microsoft YaHei",sans-serif;
    background:var(--bg0); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:30px 20px 60px; overflow-x:hidden; position:relative;
  }
  .bg-blob { position:fixed; border-radius:50%; filter:blur(110px); opacity:.5; pointer-events:none; z-index:-1; }
  .b1 { width:540px; height:540px; background:#2b2070; top:-170px; left:-130px; }
  .b2 { width:500px; height:500px; background:#0e4a5e; bottom:-170px; right:-110px; }

  header { text-align:center; margin-bottom:20px; }
  h1 {
    font-size:2.1rem; font-weight:800; letter-spacing:.5px;
    background:linear-gradient(90deg,#ffd54f,#ff8a65,#f06292);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { color:var(--muted); margin-top:6px; font-size:.92rem; }

  /* ===== level chips ===== */
  .levels { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:24px; max-width:780px; }
  .chip {
    display:flex; align-items:center; gap:8px;
    padding:8px 15px; border-radius:99px; cursor:pointer; font-weight:600; font-size:.86rem;
    background:var(--card); border:1px solid var(--card-border); color:var(--muted);
    transition:all .18s; user-select:none;
  }
  .chip::before {
    content:""; width:9px; height:9px; border-radius:50%; flex-shrink:0;
    background:var(--c,#888); box-shadow:0 0 9px var(--c,#888);
    opacity:.35; transition:opacity .18s;
  }
  .chip:hover { transform:translateY(-2px); color:var(--text); }
  .chip.on {
    color:var(--text); border-color:var(--c,#888);
    box-shadow:0 0 18px -6px var(--c,#888), inset 0 0 14px -10px var(--c,#888);
  }
  .chip.on::before { opacity:1; }
  .chip .cnt { font-weight:400; font-size:.76rem; opacity:.75; }

  /* ===== layout ===== */
  .main { display:flex; flex-wrap:wrap; gap:26px; justify-content:center; align-items:flex-start; width:100%; max-width:1120px; }
  .card {
    background:var(--card); border:1px solid var(--card-border); border-radius:26px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    padding:28px; box-shadow:0 24px 60px -24px rgba(0,0,0,.65);
  }
  .wheel-card { width:min(530px,94vw); display:flex; flex-direction:column; align-items:center; }

  /* ===== wheel ===== */
  .wheel-area { position:relative; width:min(420px,82vw); margin-top:14px; }
  .wheel-ring {
    position:absolute; inset:-15px; border-radius:50%;
    border:2px solid rgba(255,213,79,.35); pointer-events:none; z-index:5;
    animation:ringPulse 2.8s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { box-shadow:0 0 26px -8px rgba(255,213,79,.45), inset 0 0 22px -10px rgba(255,213,79,.4); }
    50%     { box-shadow:0 0 42px -6px rgba(255,213,79,.75), inset 0 0 30px -8px rgba(255,213,79,.6); }
  }
  .pointer {
    position:absolute; top:-13px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent;
    border-top:34px solid var(--gold); z-index:10;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.55));
  }
  canvas {
    width:100%; height:auto; display:block; border-radius:50%; cursor:pointer;
    box-shadow:0 0 0 8px #1b2142, 0 0 0 10px rgba(255,213,79,.35), 0 22px 55px -12px rgba(0,0,0,.75);
  }

  /* ===== buttons ===== */
  .controls { display:flex; gap:12px; margin-top:30px; flex-wrap:wrap; justify-content:center; }
  button { border:none; border-radius:14px; padding:13px 26px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all .18s; }
  button:disabled { opacity:.45; cursor:not-allowed; transform:none !important; }
  .btn-spin {
    font-size:1.15rem; padding:13px 40px; color:#1a1206;
    background:linear-gradient(135deg,#ffd54f,#ff9f43);
    box-shadow:0 12px 28px -10px rgba(255,170,60,.7), inset 0 1px 0 rgba(255,255,255,.55);
  }
  .btn-spin:hover { transform:translateY(-2px) scale(1.02); }
  .btn-spin:active { transform:scale(.96); }
  .btn-shuffle, .btn-reset { background:rgba(255,255,255,.07); color:var(--muted); border:1px solid var(--card-border); }
  .btn-shuffle:hover, .btn-reset:hover { color:var(--text); border-color:rgba(255,255,255,.25); transform:translateY(-2px); }

  .seg-row { margin-top:16px; color:var(--muted); font-size:.9rem; display:flex; align-items:center; gap:8px; }
  .seg-row select {
    padding:7px 14px; border-radius:10px; border:1px solid var(--card-border);
    background:rgba(255,255,255,.06); color:var(--gold); font-family:inherit; font-size:.92rem; font-weight:700; cursor:pointer;
  }
  .seg-row select:focus { outline:none; border-color:var(--gold); }

  .notice { display:none; margin-top:16px; padding:10px 18px; border-radius:12px; font-size:.92rem; text-align:center; }
  #emptyPool { background:rgba(255,160,60,.1); color:#fbbf24; border:1px solid rgba(255,160,60,.3); }
  #doneBanner { background:rgba(52,211,153,.1); color:#34d399; border:1px solid rgba(52,211,153,.3); }

  /* ===== panel ===== */
  .panel { width:min(470px,94vw); display:flex; flex-direction:column; max-height:700px; }
  .stats { margin-bottom:18px; }
  .progress-wrap { height:12px; border-radius:99px; background:rgba(255,255,255,.07); overflow:hidden; }
  .progress-bar { height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,#34d399,#22d3ee); transition:width .4s; }
  .progress-text { margin-top:8px; color:var(--muted); font-size:.84rem; }
  .panel h2 { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:12px; }
  .search {
    width:100%; padding:11px 15px; border-radius:12px; font-family:inherit; font-size:.92rem;
    border:1px solid var(--card-border); background:rgba(255,255,255,.06); color:var(--text); margin-bottom:12px;
  }
  .search::placeholder { color:#5c6488; }
  .search:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(255,213,79,.14); }
  .word-list { overflow-y:auto; flex:1; padding-right:6px; }
  .word-list::-webkit-scrollbar { width:8px; }
  .word-list::-webkit-scrollbar-track { background:transparent; }
  .word-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:99px; }
  .word-list::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.22); }
  .word-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:12px; margin-bottom:6px;
    background:rgba(255,255,255,.04); border:1px solid transparent; cursor:pointer; font-size:.9rem; transition:all .15s;
  }
  .word-item:hover { border-color:var(--card-border); background:rgba(255,255,255,.08); transform:translateX(3px); }
  .word-item .badge { font-size:.66rem; font-weight:800; border-radius:7px; padding:3px 7px; color:#101630; min-width:3.8em; text-align:center; flex-shrink:0; }
  .word-item .zh { font-family:"Noto Sans SC","Microsoft YaHei",sans-serif; font-weight:900; color:var(--gold); min-width:4.6em; font-size:1.02rem; }
  .word-item .py { color:#7dd3fc; font-size:.78rem; }
  .word-item .th { color:#c7d2ee; text-align:right; flex:1; }
  .word-item.learned { opacity:.32; }
  .word-item.learned .zh { text-decoration:line-through; }
  .btn-toggle-trans {
    width:100%; margin-bottom:12px; padding:10px; font-size:.86rem; font-weight:600;
    background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--card-border); border-radius:11px;
  }
  .btn-toggle-trans:hover { border-color:rgba(255,255,255,.28); transform:translateY(-1px); }
  .word-list.hide-trans .py, .word-list.hide-trans .th { opacity:0; transition:opacity .15s; }
  .word-list.hide-trans .word-item:hover .py, .word-list.hide-trans .word-item:hover .th { opacity:1; }
  .word-item .star { cursor:pointer; font-size:1.15rem; line-height:1; color:#5c6488; flex-shrink:0; transition:transform .15s, color .15s; user-select:none; }
  .word-item .star:hover { transform:scale(1.3); }
  .word-item.review { border-color:rgba(255,176,32,.45); background:rgba(255,176,32,.08); }
  .word-item.review .star { color:#ffb020; }
  .btn-review-mode {
    margin-top:14px; padding:11px 22px; border-radius:12px; font-size:.95rem; font-weight:700; cursor:pointer; font-family:inherit;
    background:rgba(255,176,32,.12); color:#ffb020; border:1px solid rgba(255,176,32,.4); transition:all .18s;
  }
  .btn-review-mode:hover { transform:translateY(-2px); background:rgba(255,176,32,.2); }
  .btn-review-mode.on { background:linear-gradient(135deg,#ffb020,#ff8a3d); color:#2a1800; border-color:transparent; box-shadow:0 8px 20px -8px rgba(255,176,32,.6); }
  .btn-review { background:rgba(255,176,32,.15); color:#ffb020; border:1px solid rgba(255,176,32,.4); }
  .btn-review:hover { transform:translateY(-2px); }
  .save-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
  .btn-save { padding:9px 18px; border-radius:11px; font-size:.88rem; font-weight:600; cursor:pointer; font-family:inherit; background:rgba(125,211,252,.12); color:#7dd3fc; border:1px solid rgba(125,211,252,.35); transition:all .18s; }
  .btn-save:hover { transform:translateY(-2px); background:rgba(125,211,252,.2); }

  /* ===== modal ===== */
  .modal-bg {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:100;
    background:rgba(5,8,20,.68); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:linear-gradient(165deg,#1d2348,#10142e);
    border:1px solid rgba(255,213,79,.45); border-radius:26px;
    padding:38px 34px; text-align:center; width:min(430px,90vw);
    box-shadow:0 0 90px -14px rgba(255,213,79,.3), 0 34px 70px -24px #000;
    animation:pop .32s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform:scale(.72); opacity:0; } to { transform:scale(1); opacity:1; } }
  .modal .lvl-badge { display:inline-block; font-size:.82rem; font-weight:800; border-radius:9px; padding:4px 14px; color:#101630; margin-bottom:14px; }
  .modal .zh-big {
    font-family:"Noto Sans SC","Microsoft YaHei",sans-serif; font-size:3.4rem; font-weight:900;
    color:var(--gold); margin-bottom:8px; cursor:pointer; text-shadow:0 6px 32px rgba(255,213,79,.4);
  }
  .modal .py-big { font-size:1.3rem; color:#7dd3fc; margin-bottom:10px; }
  .modal .th-big { font-size:1.22rem; color:#fff; margin-bottom:26px; }
  .modal .btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .btn-learned { background:linear-gradient(135deg,#34d399,#0ea5a4); color:#06251f; box-shadow:0 10px 24px -10px rgba(52,211,153,.6); }
  .btn-learned:hover { transform:translateY(-2px); }
  .btn-keep { background:rgba(255,255,255,.07); color:var(--muted); border:1px solid var(--card-border); }
  .btn-keep:hover { color:var(--text); border-color:rgba(255,255,255,.25); }
  .btn-reveal { background:linear-gradient(135deg,#7dd3fc,#3b82f6); color:#06243f; box-shadow:0 10px 24px -10px rgba(59,130,246,.6); }
  .btn-reveal:hover { transform:translateY(-2px); }
  .reveal-hint { color:#5c6488; font-size:.85rem; margin-bottom:18px; cursor:pointer; user-select:none; }
  .hidden-part { visibility:hidden; }

  @media (max-width:560px) {
    h1 { font-size:1.5rem; }
    .card { padding:18px; }
  }
</style>
</head>
<body>
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>

<header>
  <h1>🎡 วงล้อคำศัพท์จีน</h1>
  <div class="subtitle">765 คำจากเรื่อง «ผู้โชคดีคนที่ 1,000,000» — เลือกระดับ HSK ที่อยากฝึก แล้วหมุนเลย!</div>
</header>

<div class="levels" id="levelChips"></div>

<div class="main">
  <section class="card wheel-card">
    <div class="wheel-area">
      <div class="wheel-ring"></div>
      <div class="pointer"></div>
      <canvas id="wheel" width="600" height="600" title="คลิกวงล้อเพื่อหมุนได้เลย"></canvas>
    </div>
    <div class="controls">
      <button class="btn-spin" id="spinBtn">🎰 หมุน!</button>
      <button class="btn-shuffle" id="shuffleBtn">🔀 สับคำใหม่</button>
      <button class="btn-reset" id="resetBtn">♻️ รีเซ็ต</button>
    </div>
    <div class="seg-row">
      จำนวนคำต่อรอบ
      <select id="segSelect">
        <option value="10">10 คำ</option>
        <option value="20">20 คำ</option>
        <option value="50">50 คำ</option>
        <option value="100">100 คำ</option>
      </select>
    </div>
    <button class="btn-review-mode" id="reviewModeBtn"></button>
    <div class="save-row">
      <button class="btn-save" id="exportBtn">💾 สำรองข้อมูล</button>
      <button class="btn-save" id="importBtn">📂 กู้คืนข้อมูล</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
    <div class="notice" id="emptyPool">⚠️ ไม่มีคำเหลือในระดับที่เลือก — เลือกระดับเพิ่ม หรือกดรีเซ็ต</div>
    <div class="notice" id="doneBanner">🏆 เก่งมาก! จำคำศัพท์ในระดับที่เลือกครบแล้ว!</div>
  </section>

  <aside class="card panel">
    <div class="stats">
      <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <h2>📚 คำศัพท์ทั้งหมด (<span id="totalCount"></span> คำ)</h2>
    <input class="search" id="search" placeholder="ค้นหา จีน / พินอิน / ไทย ...">
    <button class="btn-toggle-trans" id="toggleTransBtn"></button>
    <div class="word-list" id="wordList"></div>
  </aside>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div><span class="lvl-badge" id="mLvl"></span></div>
    <div class="zh-big" id="mZh"></div>
    <div class="reveal-hint" id="revealHint">👆 ลองทายความหมายก่อน แล้วแตะตรงนี้เพื่อเฉลย</div>
    <div class="py-big hidden-part" id="mPy"></div>
    <div class="th-big hidden-part" id="mTh"></div>
    <div class="btns">
      <button class="btn-reveal" id="revealBtn">👁️ ดูเฉลย</button>
      <button class="btn-learned" id="learnedBtn">✅ จำได้แล้ว เอาออก</button>
      <button class="btn-keep" id="keepBtn">🔁 เก็บไว้หมุนต่อ</button>
      <button class="btn-review" id="reviewBtn">📌 ยังไม่รู้ เก็บทบทวน</button>
    </div>
  </div>
</div>

<script>
// ===== ระดับ =====
const LEVELS = {

  2:{label:"HSK2", color:"#00bcd4"},

  4:{label:"HSK4", color:"#9c6bff"},

// ===== สถานะเกม =====
let segCount = parseInt(localStorage.getItem("vw_segcount")||"100");
const COLORS = ["#ff6b6b","#ffa502","#ffd54f","#00c896","#00bcd4","#5c7cfa","#9c6bff","#f06292","#4dd0a0","#ff8a65"];
let learned = new Set(JSON.parse(localStorage.getItem("vw_learned_v2")||"[]")); // เก็บเป็นตัวคำจีน
let activeLevels = new Set(JSON.parse(localStorage.getItem("vw_levels")||"[1,2,3,4,5,6,7]"));
let current = [];
let angle = 0;
let spinning = false;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const cx = 300, cy = 300, R = 290;

let review = new Set(JSON.parse(localStorage.getItem("vw_review")||"[]"));
let reviewMode = localStorage.getItem("vw_reviewmode")==="1";
function reviewCount() { return VOCAB.filter(v=>review.has(v[0]) && activeLevels.has(v[3])).length; }
function poolIndexes() {
  if (reviewMode) return VOCAB.map((_,i)=>i).filter(i=>review.has(VOCAB[i][0]) && activeLevels.has(VOCAB[i][3]));
  return VOCAB.map((_,i)=>i).filter(i=>!learned.has(VOCAB[i][0]) && activeLevels.has(VOCAB[i][3]));
}
function sampleSegments() {
  const pool = poolIndexes();
  const shuffled = [...pool].sort(()=>Math.random()-.5);
  current = shuffled.slice(0, Math.min(segCount, shuffled.length));
  document.getElementById("emptyPool").textContent = reviewMode
    ? "⭐ ยังไม่มีคำในรายการทบทวน — กดดาว ☆ ที่คำศัพท์ หรือปุ่ม 📌 ตอนหมุนได้คำ"
    : "⚠️ ไม่มีคำเหลือในระดับที่เลือก — เลือกระดับเพิ่ม หรือกดรีเซ็ต";
  document.getElementById("emptyPool").style.display = current.length===0 ? "block" : "none";
}
function drawWheel() {
  ctx.clearRect(0,0,600,600);
  const n = current.length;
  if (n === 0) {
    ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI);
    ctx.fillStyle="#222a44"; ctx.fill();
    ctx.fillStyle="#667"; ctx.font="28px sans-serif"; ctx.textAlign="center";
    ctx.fillText("ไม่มีคำศัพท์", cx, cy);
    return;
  }
  const seg = 2*Math.PI/n;
  for (let i=0;i<n;i++) {
    const a0 = angle + i*seg, a1 = a0 + seg;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,a0,a1);
    ctx.closePath();
    ctx.fillStyle = COLORS[i%COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.25)";
    ctx.lineWidth = n > 40 ? 0.5 : 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(a0 + seg/2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#1a1a2e";
    const w = VOCAB[current[i]][0];
    // ขนาดตัวอักษรปรับตามจำนวนช่อง ไม่ให้ล้นช่อง
    let fs = Math.min(34, Math.max(9, Math.floor(2*Math.PI*(R-70)/n*0.62)));
    if (w.length > 4) fs = Math.floor(fs*0.72);
    else if (w.length > 2) fs = Math.floor(fs*0.88);
    ctx.font = "bold " + fs + "px 'Microsoft YaHei', sans-serif";
    ctx.fillText(w, R-10, fs*0.35);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx,cy,42,0,2*Math.PI);
  ctx.fillStyle="#222a44"; ctx.fill();
  ctx.strokeStyle="#ffd54f"; ctx.lineWidth=4; ctx.stroke();
  ctx.fillStyle="#ffd54f"; ctx.font="26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("中文", cx, cy);
  ctx.textBaseline="alphabetic";
}
function spin() {
  if (spinning || current.length===0) return;
  spinning = true;
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("shuffleBtn").disabled = true;
  const extra = (5 + Math.random()*4) * 2*Math.PI + Math.random()*2*Math.PI;
  const start = angle;
  const dur = 4200, t0 = performance.now();
  function frame(t) {
    const p = Math.min((t-t0)/dur, 1);
    const ease = 1 - Math.pow(1-p, 4);
    angle = start + extra*ease;
    drawWheel();
    if (p < 1) requestAnimationFrame(frame);
    else {
      spinning = false;
      document.getElementById("spinBtn").disabled = false;
      document.getElementById("shuffleBtn").disabled = false;
      showResult(landedIndex());
    }
  }
  requestAnimationFrame(frame);
}
function landedIndex() {
  const n = current.length, seg = 2*Math.PI/n;
  const pointerAngle = -Math.PI/2;
  let rel = (pointerAngle - angle) % (2*Math.PI);
  if (rel < 0) rel += 2*Math.PI;
  return Math.floor(rel/seg) % n;
}
let resultVocabIdx = -1;
function showResult(segIdx) {
  resultVocabIdx = current[segIdx];
  const [zh,py,th,lvl] = VOCAB[resultVocabIdx];
  document.getElementById("mZh").textContent = zh;
  document.getElementById("mPy").textContent = py;
  document.getElementById("mTh").textContent = th;
  const badge = document.getElementById("mLvl");
  badge.textContent = LEVELS[lvl].label;
  badge.style.background = LEVELS[lvl].color;
  document.getElementById("mPy").classList.add("hidden-part");
  document.getElementById("mTh").classList.add("hidden-part");
  document.getElementById("revealHint").style.display = "block";
  document.getElementById("revealBtn").style.display = "";
  document.getElementById("modalBg").classList.add("show");
}
function reveal() {
  document.getElementById("mPy").classList.remove("hidden-part");
  document.getElementById("mTh").classList.remove("hidden-part");
  document.getElementById("revealHint").style.display = "none";
  document.getElementById("revealBtn").style.display = "none";
}
function closeModal() {
  document.getElementById("modalBg").classList.remove("show");
}
function renderChips() {
  const wrap = document.getElementById("levelChips");
  wrap.innerHTML = "";
  for (const lvl of [1,2,3,4,5,6,7]) {
    const total = VOCAB.filter(v=>v[3]===lvl).length;
    const done = VOCAB.filter(v=>v[3]===lvl && learned.has(v[0])).length;
    const c = document.createElement("div");
    c.className = "chip" + (activeLevels.has(lvl)?" on":"");
    c.style.setProperty("--c", LEVELS[lvl].color);
    c.innerHTML = `${LEVELS[lvl].label} <span class="cnt">${done}/${total}</span>`;
    c.onclick = ()=>{
      if (spinning) return;
      activeLevels.has(lvl) ? activeLevels.delete(lvl) : activeLevels.add(lvl);
      localStorage.setItem("vw_levels", JSON.stringify([...activeLevels]));
      updateUI(); sampleSegments(); drawWheel();
    };
    wrap.appendChild(c);
  }
}
function updateUI() {
  const active = VOCAB.filter(v=>activeLevels.has(v[3]));
  const total = active.length;
  const done = active.filter(v=>learned.has(v[0])).length;
  document.getElementById("bar").style.width = total? (done/total*100)+"%" : "0%";
  document.getElementById("progressText").textContent =
    total ? `ระดับที่เลือก: จำได้แล้ว ${done} / ${total} คำ — เหลืออีก ${total-done} คำ`
          : "ยังไม่ได้เลือกระดับ — แตะป้าย HSK ด้านบนเพื่อเลือก";
  document.getElementById("totalCount").textContent = VOCAB.length;
  document.getElementById("doneBanner").style.display = (total>0 && done===total) ? "block" : "none";
  renderChips();
  renderList();
  updateReviewModeBtn();
  localStorage.setItem("vw_learned_v2", JSON.stringify([...learned]));
}
function toggleReview(zh) {
  review.has(zh) ? review.delete(zh) : review.add(zh);
  localStorage.setItem("vw_review", JSON.stringify([...review]));
  updateReviewModeBtn(); renderList();
  if (reviewMode) { sampleSegments(); drawWheel(); }
}
function updateReviewModeBtn() {
  const btn = document.getElementById("reviewModeBtn");
  if (!btn) return;
  btn.textContent = reviewMode ? "📚 ออกจากโหมดทบทวน (ดูทุกคำ)" : `🎯 ฝึกเฉพาะคำทบทวน (${reviewCount()})`;
  btn.classList.toggle("on", reviewMode);
}
let hideTrans = localStorage.getItem("vw_hidetrans")==="1";
function applyHideTrans() {
  document.getElementById("wordList").classList.toggle("hide-trans", hideTrans);
  document.getElementById("toggleTransBtn").textContent =
    hideTrans ? "👁️ แสดงคำแปล + พินอิน" : "🙈 ซ่อนคำแปล + พินอิน (เห็นแค่ตัวจีน)";
}
function renderList() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const el = document.getElementById("wordList");
  el.innerHTML = "";
  applyHideTrans();
  const order = VOCAB.map((_,i)=>i).sort((a,b)=>VOCAB[a][3]-VOCAB[b][3]);
  order.forEach(i=>{
    const [zh,py,th,lvl] = VOCAB[i];
    if (!activeLevels.has(lvl)) return;
    if (reviewMode && !review.has(zh)) return;
    if (q && !(zh.includes(q)||py.toLowerCase().includes(q)||th.toLowerCase().includes(q))) return;
    const d = document.createElement("div");
    d.className = "word-item" + (learned.has(zh)?" learned":"") + (review.has(zh)?" review":"");
    d.innerHTML = `<span class="badge" style="background:${LEVELS[lvl].color}">${LEVELS[lvl].label}</span>`+
                  `<span class="zh">${zh}</span><span class="py">${py}</span><span class="th">${th}</span>`+
                  `<span class="star" title="เพิ่ม/เอาออกจากรายการทบทวน">★</span>`;
    d.title = "คลิกเพื่อสลับสถานะ จำได้/ยังไม่จำ";
    d.onclick = ()=>{ learned.has(zh)?learned.delete(zh):learned.add(zh); updateUI(); sampleSegments(); drawWheel(); };
    d.querySelector(".star").onclick = (e)=>{ e.stopPropagation(); toggleReview(zh); };
    el.appendChild(d);
  });
}

  localStorage.setItem("vw_reviewmode", reviewMode ? "1" : "0");
  updateReviewModeBtn(); renderList(); sampleSegments(); drawWheel();

function exportData() {
  const data = {};
  for (let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.indexOf("vw_")===0) data[k]=localStorage.getItem(k); }
  const payload = { app:"vocab-wheel", exported:new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vocab-wheel-backup-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const obj = JSON.parse(e.target.result);
      const data = (obj && obj.data) ? obj.data : obj;
      if (!data || typeof data !== "object") throw new Error("bad");
      let n=0;
      Object.keys(data).forEach(k=>{ if(k.indexOf("vw_")===0){ localStorage.setItem(k, data[k]); n++; } });
      if (n===0) { alert("ไฟล์นี้ไม่มีข้อมูลของเกมนี้"); return; }
      alert("กู้คืนข้อมูลสำเร็จ ("+n+" รายการ) — กำลังโหลดใหม่");
      location.reload();
    } catch(err) { alert("ไฟล์สำรองไม่ถูกต้อง"); }
  };
  reader.readAsText(file);
}
document.getElementById("exportBtn").onclick = exportData;
document.getElementById("importBtn").onclick = ()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange = (e)=>{ if(e.target.files && e.target.files[0]) importData(e.target.files[0]); e.target.value=""; };

const segSelect = document.getElementById("segSelect");
segSelect.value = String(segCount);
if (segSelect.value !== String(segCount)) { segCount = 100; segSelect.value = "100"; }
segSelect.onchange = ()=>{
  if (spinning) { segSelect.value = String(segCount); return; }
  segCount = parseInt(segSelect.value);
  localStorage.setItem("vw_segcount", String(segCount));
  sampleSegments(); drawWheel();
};

sampleSegments();
drawWheel();
updateUI();
</script>
